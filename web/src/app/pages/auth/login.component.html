<div class="flex items-center justify-center min-h-screen bg-surface-100 dark:bg-surface-950">
    <div class="w-full max-w-sm">

        <!-- Logo + título -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary mb-4 shadow-lg">
                <i class="pi pi-video text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 mb-1">CallMeApp</h1>
            <p class="text-surface-500 text-sm">Sign in to continue</p>
        </div>

        <div class="card px-8 py-8 shadow-lg border border-surface-200 dark:border-surface-700 rounded-2xl">
            <p-toast />

            <form (ngSubmit)="submit()" class="flex flex-col gap-5">
                <div>
                    <label for="identifier" class="block text-sm font-semibold text-surface-700 dark:text-surface-200 mb-2">Email or Username</label>
                    <input
                        id="identifier"
                        name="identifier"
                        type="text"
                        pInputText
                        [(ngModel)]="identifier"
                        placeholder="your@email.com or john_doe"
                        fluid
                        [disabled]="loading"
                    />
                    <small class="text-red-500" *ngIf="submitted && !identifier">Email or username is required.</small>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-surface-700 dark:text-surface-200 mb-2">Password</label>
                    <p-password
                        id="password"
                        name="password"
                        [(ngModel)]="password"
                        placeholder="••••••••"
                        [feedback]="false"
                        [toggleMask]="true"
                        fluid
                        [disabled]="loading"
                        (keydown.enter)="submit()"
                    />
                    <small class="text-red-500" *ngIf="submitted && !password">Password is required.</small>
                </div>

                <p-button
                    label="Sign In"
                    icon="pi pi-sign-in"
                    [loading]="loading"
                    type="submit"
                    fluid
                />
            </form>

            <div class="text-center mt-6 pt-5 border-t border-surface-200 dark:border-surface-700">
                <span class="text-surface-500 text-sm">Don't have an account? </span>
                <a routerLink="/auth/register" class="text-primary font-semibold text-sm hover:underline cursor-pointer">Create one</a>
                <div class="mt-3">
                    <a routerLink="/auth/forgot-password" class="text-surface-400 text-xs hover:underline cursor-pointer">Forgot password?</a>
                </div>
            </div>
        </div>
    </div>
</div>
