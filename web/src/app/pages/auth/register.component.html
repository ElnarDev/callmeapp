<div class="flex items-center justify-center min-h-screen bg-surface-100 dark:bg-surface-950">
    <div class="w-full max-w-sm">

        <!-- Logo + título -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary mb-4 shadow-lg">
                <i class="pi pi-video text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 mb-1">CallMeApp</h1>
            <p class="text-surface-500 text-sm">Create your account</p>
        </div>

        <div class="card px-8 py-8 shadow-lg border border-surface-200 dark:border-surface-700 rounded-2xl">
            <p-toast />

            <form (ngSubmit)="submit()" class="flex flex-col gap-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-surface-700 dark:text-surface-200 mb-2">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        pInputText
                        [(ngModel)]="username"
                        placeholder="e.g. john_doe"
                        fluid
                        [disabled]="loading"
                        autofocus
                    />
                    <small class="text-red-500" *ngIf="submitted && !username">Username is required.</small>
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-surface-700 dark:text-surface-200 mb-2">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        pInputText
                        [(ngModel)]="email"
                        placeholder="your@email.com"
                        fluid
                        [disabled]="loading"
                    />
                    <small class="text-red-500" *ngIf="submitted && !email">Email is required.</small>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-surface-700 dark:text-surface-200 mb-2">Password</label>
                    <p-password
                        id="password"
                        name="password"
                        [(ngModel)]="password"
                        placeholder="••••••••"
                        [feedback]="true"
                        [toggleMask]="true"
                        fluid
                        [disabled]="loading"
                    />
                    <small class="text-red-500" *ngIf="submitted && !password">Password is required.</small>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-semibold text-surface-700 dark:text-surface-200 mb-2">Confirm Password</label>
                    <p-password
                        id="confirmPassword"
                        name="confirmPassword"
                        [(ngModel)]="confirmPassword"
                        placeholder="••••••••"
                        [feedback]="false"
                        [toggleMask]="true"
                        fluid
                        [disabled]="loading"
                        (keydown.enter)="submit()"
                    />
                    <small class="text-red-500" *ngIf="submitted && password && confirmPassword && password !== confirmPassword">Passwords do not match.</small>
                    <small class="text-red-500" *ngIf="submitted && !confirmPassword">Please confirm your password.</small>
                </div>

                <p-button
                    label="Create Account"
                    icon="pi pi-user-plus"
                    [loading]="loading"
                    type="submit"
                    fluid
                />
            </form>

            <div class="text-center mt-6 pt-5 border-t border-surface-200 dark:border-surface-700">
                <span class="text-surface-500 text-sm">Already have an account? </span>
                <a routerLink="/auth/login" class="text-primary font-semibold text-sm hover:underline cursor-pointer">Sign in</a>
            </div>
        </div>
    </div>
</div>
